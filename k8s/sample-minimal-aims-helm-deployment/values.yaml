# Default values for sample-minimal-aims-helm-deployment.
# This is a YAML-formatted file.
# Declare variables to be substituted into your templates.

replicaCount: 1

image: amdenterpriseai/aim-meta-llama-llama-3-1-8b-instruct:0.11.0
imagePullPolicy: Always

nameOverride: ""
fullnameOverride: ""

# Model configuration (optional, can be overridden)
model: ""

# GPU configuration
gpus: 1
memory: "16Gi"
cpu: 4

# AIM configuration
aim:
  precision: "auto"
  gpuModel: "auto"
  engine: "vllm"
  metric: "latency"
  logLevelRoot: "INFO"
  logLevel: "INFO"

# Additional environment variables
env_vars: {}

service:
  type: ClusterIP
  port: 8000

# Probe configuration
probes:
  startup:
    periodSeconds: 10
    failureThreshold: 60

# Volume configuration
volumes:
  ephemeralStorage:
    sizeLimit: 256Gi
  dshm:
    sizeLimit: 32Gi
