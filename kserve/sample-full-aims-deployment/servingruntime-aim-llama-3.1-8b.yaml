apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: aim-llama-3-1-8b-instruct-runtime
spec:
  supportedModelFormats:
  - name: aim-llama-3-1-8b-instruct
  containers:
  - name: kserve-container
    image: amdenterpriseai/aim-meta-llama-llama-3-1-8b-instruct:0.11.0
    imagePullPolicy: Always
    command:
      - /bin/bash
      - -c
      - |
        pip install \
          opentelemetry-sdk \
          opentelemetry-api \
          opentelemetry-exporter-otlp \
          opentelemetry-semantic-conventions-ai && \
        exec ./entrypoint.py
    ports:
    - name: http
      containerPort: 8000
      protocol: TCP
    env:
    - name: VLLM_ENABLE_METRICS
      value: "true"
    volumeMounts:
    - mountPath: /dev/shm
      name: dshm
  volumes:
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 8Gi
