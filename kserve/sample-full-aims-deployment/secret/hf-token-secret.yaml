apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: default
type: Opaque
data:
  # Replace YOUR_HF_TOKEN_HERE with your actual Hugging Face token (base64 encoded)
  # To encode your token: echo -n "hf_your_actual_token_here" | base64
  HF_TOKEN: YOUR_HF_TOKEN_HERE
---
# Example of how to create this secret manually:
# kubectl create secret generic hf-token \
#   --from-literal=HF_TOKEN=hf_your_actual_token_here \
#   --namespace=default